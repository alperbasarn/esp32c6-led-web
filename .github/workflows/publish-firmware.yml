name: Publish Firmware

on:
  release:
    types:
      - published
  # Build (and run the config guards) on PRs as a CI gate. The builder image
  # bakes in ESP-IDF + esp-matter, so there is no cache to prime -- and we do
  # NOT build on plain main pushes, because a release is a version-bump push to
  # main followed by a tag, and both events firing this workflow built the same
  # commit twice. Release-only steps self-skip via `if: github.event_name == 'release'`.
  pull_request:
  workflow_dispatch:
    inputs:
      rollout_percent:
        description: "Staged rollout percentage (0-100)"
        default: "100"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IDF_VERSION: v5.4.1
  ESP_MATTER_REF: c6f767254f6267e057916981646a44c65d034254
  FIRMWARE_ASSET_NAME: esp32c6_led_web.bin
  MANIFEST_ASSET_NAME: manifest.json
  MANIFEST_SIG_ASSET_NAME: manifest.json.sig
  BOOTLOADER_ASSET_NAME: bootloader.bin
  PARTITION_TABLE_ASSET_NAME: partition-table.bin
  OTA_DATA_INITIAL_ASSET_NAME: ota_data_initial.bin

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # ESP-IDF v5.4.1 + esp-matter c6f7672 are baked into this image, so the
    # toolchain install/cache steps are gone. `credentials` lets the runner pull
    # the (private) image from GHCR.
    container:
      # DEV branch: use the experimental :dev image (ccache + prune). Restore the
      # pinned production tag on merge to main.
      image: ghcr.io/alperbasarn/esp32c6-matter-builder:dev
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout project
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Persist ccache across runs so esp-matter/CHIP objects (the bulk of the
      # ~6 min compile, and rarely changed) are reused. IDF_CCACHE_ENABLE is set
      # in the builder image; CCACHE_DIR (on the build step) points ccache here.
      - name: Restore ccache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: .ccache
          key: ccache-esp32c6-${{ github.sha }}
          restore-keys: |
            ccache-esp32c6-

      # No actions/setup-python here: this job runs inside the builder image,
      # which already ships ESP-IDF's Python and virtualenv. A different Python
      # shadows it on PATH, so export.sh computes the wrong idf<ver>_py<X>_env
      # name and fails. The steps below use the image's own python3.

      - name: Build firmware
        shell: bash
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          # The builder image bakes ESP-IDF + esp-matter. Source IDF's
          # export.sh for idf.py/toolchain, then esp-matter's export.sh to
          # activate the CHIP/pigweed environment (this generates/locates
          # build_overrides/pigweed_environment.gni, which the CHIP gn build
          # needs — baked env vars alone are not enough).
          . "$IDF_PATH/export.sh" >/dev/null
          . "$ESP_MATTER_PATH/export.sh" >/dev/null
          cd "$GITHUB_WORKSPACE"
          idf.py set-target esp32c6 build
          grep -q '^CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=y$' sdkconfig
          grep -q '^CONFIG_APP_OTA_SIG_VERIFY=y$' sdkconfig
          ccache -s || true   # hit-rate telemetry for the ccache experiment

      - name: Verify signing key present when OTA verify enabled
        shell: bash
        run: |
          set -euo pipefail
          if grep -q '^CONFIG_APP_OTA_SIG_VERIFY=y$' sdkconfig; then
            if ! grep -q -- '-----BEGIN PUBLIC KEY-----' main/include/release_pubkey.h; then
              echo "CONFIG_APP_OTA_SIG_VERIFY=y but main/include/release_pubkey.h has no PEM public key" >&2
              exit 1
            fi
          fi

      - name: Check sdkconfig drift
        shell: bash
        run: |
          # NON-FAILING: sdkconfig is tracked, but a build can regenerate it with
          # drift we cannot reconcile here (there is no clean local baseline build
          # in CI). Emit a warning annotation only. Promote this to a hard failure
          # (exit 1) once sdkconfig is reconciled against a clean build.
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          if ! git diff --quiet -- sdkconfig; then
            git diff --stat -- sdkconfig || true
            echo "::warning::sdkconfig drifted during build; reconcile and commit the regenerated sdkconfig"
          fi

      - name: Validate release version
        if: github.event_name == 'release'
        id: release-metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          test -s build/project_description.json
          app_version="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["project_version"])' build/project_description.json)"
          release_version="${RELEASE_TAG#v}"
          if [[ -z "$app_version" || "$release_version" != "$app_version" ]]; then
            echo "Release tag $RELEASE_TAG does not match built app version $app_version" >&2
            exit 1
          fi
          echo "version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Generate signed manifest
        if: github.event_name == 'release'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO_SLUG: ${{ github.repository }}
          IDF_REF: ${{ env.IDF_VERSION }}
          MATTER_REF: ${{ env.ESP_MATTER_REF }}
          APP_BIN: build/${{ env.FIRMWARE_ASSET_NAME }}
          APP_VERSION: ${{ steps.release-metadata.outputs.version }}
          SIGNING_KEY_PEM: ${{ secrets.MANIFEST_SIGNING_KEY }}
          ROLLOUT_PERCENT: ${{ github.event.inputs.rollout_percent || '100' }}
        run: |
          chmod +x scripts/generate-manifest.sh
          scripts/generate-manifest.sh

      - name: Verify release bundle
        if: github.event_name == 'release'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          set -euo pipefail
          for artifact in \
            "build/$FIRMWARE_ASSET_NAME" \
            "build/bootloader/$BOOTLOADER_ASSET_NAME" \
            "build/partition_table/$PARTITION_TABLE_ASSET_NAME" \
            "build/$OTA_DATA_INITIAL_ASSET_NAME" \
            "$MANIFEST_ASSET_NAME" \
            "$MANIFEST_SIG_ASSET_NAME"; do
            test -s "$artifact" || { echo "Missing or empty release artifact: $artifact" >&2; exit 1; }
          done

          pubkey_file="$(mktemp)"
          trap 'rm -f "$pubkey_file"' EXIT
          python3 - "$pubkey_file" "$RELEASE_TAG" "$REPO_SLUG" "$FIRMWARE_ASSET_NAME" <<'PY'
          import ast
          import hashlib
          import json
          import sys
          from pathlib import Path

          pubkey_file, release_tag, repo_slug, asset_name = sys.argv[1:]
          release_version = release_tag.removeprefix("v")
          manifest_path = Path("manifest.json")
          app_path = Path("build") / asset_name
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))

          if manifest.get("version") != release_version:
              raise SystemExit(f"manifest version {manifest.get('version')!r} != release version {release_version!r}")
          if manifest.get("chip") != "esp32c6":
              raise SystemExit("manifest chip is not esp32c6")
          for field in ("idf_ref", "matter_ref"):
              if not isinstance(manifest.get(field), str) or not manifest[field]:
                  raise SystemExit(f"manifest field {field!r} is missing")

          app = manifest.get("app")
          if not isinstance(app, dict):
              raise SystemExit("manifest app object is missing")
          expected_url = f"https://github.com/{repo_slug}/releases/download/{release_tag}/{asset_name}"
          if app.get("url") != expected_url:
              raise SystemExit(f"manifest URL {app.get('url')!r} != expected URL {expected_url!r}")
          actual_sha256 = hashlib.sha256(app_path.read_bytes()).hexdigest()
          if app.get("sha256") != actual_sha256:
              raise SystemExit("manifest SHA-256 does not match the published application image")
          if app.get("size") != app_path.stat().st_size:
              raise SystemExit("manifest size does not match the published application image")

          rollout = manifest.get("rollout")
          if not isinstance(rollout, dict) or not isinstance(rollout.get("percent"), int) or not 0 <= rollout["percent"] <= 100:
              raise SystemExit("manifest rollout.percent must be an integer from 0 through 100")

          pem_parts = []
          for raw_line in Path("main/include/release_pubkey.h").read_text(encoding="utf-8").splitlines():
              line = raw_line.strip().rstrip(";")
              if line.startswith('"'):
                  pem_parts.append(ast.literal_eval(line))
          pem = "".join(pem_parts)
          if not pem.startswith("-----BEGIN PUBLIC KEY-----\n") or not pem.endswith("-----END PUBLIC KEY-----\n"):
              raise SystemExit("could not extract a PEM public key from main/include/release_pubkey.h")
          Path(pubkey_file).write_text(pem, encoding="ascii", newline="")
          PY
          openssl dgst -sha256 -verify "$pubkey_file" \
            -signature "$MANIFEST_SIG_ASSET_NAME" "$MANIFEST_ASSET_NAME"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: esp32c6-led-web-firmware
          path: |
            build/esp32c6_led_web.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin
            build/project_description.json
            manifest.json
            manifest.json.sig
          if-no-files-found: warn

      # The esp-idf builder image has no GitHub CLI (the host runner did), so
      # install a pinned gh binary before the upload step.
      - name: Install GitHub CLI
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -eux
          gh_version=2.62.0
          curl -fsSL "https://github.com/cli/cli/releases/download/v${gh_version}/gh_${gh_version}_linux_amd64.tar.gz" -o /tmp/gh.tgz
          tar -xzf /tmp/gh.tgz -C /tmp
          install "/tmp/gh_${gh_version}_linux_amd64/bin/gh" /usr/local/bin/gh
          gh --version

      - name: Attach release artifacts
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # The application binary (used by OTA).
          gh release upload "$RELEASE_TAG" "build/$FIRMWARE_ASSET_NAME" --clobber

          # Bootloader + partition table for first-time USB flashing.
          gh release upload "$RELEASE_TAG" \
            "build/bootloader/$BOOTLOADER_ASSET_NAME" \
            "build/partition_table/$PARTITION_TABLE_ASSET_NAME" --clobber

          # ota_data_initial is required for a complete first-time USB flash.
          gh release upload "$RELEASE_TAG" \
            "build/$OTA_DATA_INITIAL_ASSET_NAME" --clobber

          # Signed manifest (devices fetch via /releases/latest/download/manifest.json).
          gh release upload "$RELEASE_TAG" "$MANIFEST_ASSET_NAME" --clobber
          test -s "$MANIFEST_SIG_ASSET_NAME"
          gh release upload "$RELEASE_TAG" "$MANIFEST_SIG_ASSET_NAME" --clobber

      - name: Verify published release
        if: github.event_name == 'release'
        shell: bash
        env:
          REPO_SLUG: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Re-fetch the ACTUAL published assets the fleet will download and
          # re-verify them end to end. This catches a broken publish (404s,
          # truncated blobs, a stale manifest/sig pairing) that the pre-upload
          # "Verify release bundle" step cannot see.
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          base="https://github.com/$REPO_SLUG/releases/latest/download"

          fetch() {
            local url="$1" out="$2" attempt
            for attempt in 1 2 3 4 5; do
              if curl --fail --location --silent --show-error --output "$out" "$url"; then
                return 0
              fi
              echo "Attempt $attempt failed for $url; retrying in 15s (release/latest may still be propagating)..." >&2
              sleep 15
            done
            return 1
          }

          for asset in "$MANIFEST_ASSET_NAME" "$MANIFEST_SIG_ASSET_NAME" "$FIRMWARE_ASSET_NAME"; do
            echo "Fetching published asset: $asset"
            fetch "$base/$asset" "$workdir/$asset" \
              || { echo "Could not download published asset: $asset" >&2; exit 1; }
            test -s "$workdir/$asset" \
              || { echo "Published asset empty or missing: $asset" >&2; exit 1; }
          done

          pubkey_file="$workdir/release_pubkey.pem"
          python3 - "$pubkey_file" <<'PY'
          import ast
          import sys
          from pathlib import Path

          pubkey_file = sys.argv[1]
          pem_parts = []
          for raw_line in Path("main/include/release_pubkey.h").read_text(encoding="utf-8").splitlines():
              line = raw_line.strip().rstrip(";")
              if line.startswith('"'):
                  pem_parts.append(ast.literal_eval(line))
          pem = "".join(pem_parts)
          if not pem.startswith("-----BEGIN PUBLIC KEY-----\n") or not pem.endswith("-----END PUBLIC KEY-----\n"):
              raise SystemExit("could not extract a PEM public key from main/include/release_pubkey.h")
          Path(pubkey_file).write_text(pem, encoding="ascii", newline="")
          PY

          # 1) Detached signature of the PUBLISHED manifest must verify.
          openssl dgst -sha256 -verify "$pubkey_file" \
            -signature "$workdir/$MANIFEST_SIG_ASSET_NAME" "$workdir/$MANIFEST_ASSET_NAME"

          # 2) sha256(published bin) must equal the PUBLISHED manifest.app.sha256.
          python3 - "$workdir" "$FIRMWARE_ASSET_NAME" "$MANIFEST_ASSET_NAME" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          workdir, asset_name, manifest_name = sys.argv[1:]
          manifest = json.loads((Path(workdir) / manifest_name).read_text(encoding="utf-8"))
          app = manifest.get("app")
          if not isinstance(app, dict):
              raise SystemExit("published manifest app object is missing")
          actual = hashlib.sha256((Path(workdir) / asset_name).read_bytes()).hexdigest()
          if app.get("sha256") != actual:
              raise SystemExit(
                  f"published bin sha256 {actual!r} != manifest.app.sha256 {app.get('sha256')!r}"
              )
          print("Published release verified: signature OK and sha256 matches manifest.")
          PY
