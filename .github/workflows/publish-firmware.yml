name: Publish Firmware

on:
  release:
    types:
      - published
  workflow_dispatch:

env:
  IDF_VERSION: v5.4.1
  ESP_MATTER_REF: c6f767254f6267e057916981646a44c65d034254
  FIRMWARE_ASSET_NAME: esp32c6_led_web.bin
  MANIFEST_ASSET_NAME: manifest.json
  MANIFEST_SIG_ASSET_NAME: manifest.json.sig
  BOOTLOADER_ASSET_NAME: bootloader.bin
  PARTITION_TABLE_ASSET_NAME: partition-table.bin

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Cache ESP-IDF + its toolchain. Keyed on IDF_VERSION — bump the suffix
      # ("v1") to force a rebuild if cache contents become stale.
      - name: Restore ESP-IDF cache
        id: cache-idf
        uses: actions/cache@v4
        with:
          path: |
            ~/esp-idf
            ~/.espressif
          key: idf-${{ env.IDF_VERSION }}-${{ runner.os }}-v1

      - name: Install ESP-IDF (cache miss)
        if: steps.cache-idf.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 --branch "$IDF_VERSION" --recursive https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          cd "$HOME/esp-idf"
          ./install.sh esp32c6

      # Cache esp-matter (clone + submodules + the chip .environment built by
      # install.sh). Keyed on ESP_MATTER_REF so any pin bump invalidates.
      - name: Restore esp-matter cache
        id: cache-matter
        uses: actions/cache@v4
        with:
          path: |
            ~/esp-matter
          key: matter-${{ env.ESP_MATTER_REF }}-${{ runner.os }}-v1

      - name: Check out esp-matter (cache miss)
        if: steps.cache-matter.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --recursive https://github.com/espressif/esp-matter.git "$HOME/esp-matter"
          git -C "$HOME/esp-matter" checkout "$ESP_MATTER_REF"
          git -C "$HOME/esp-matter" submodule update --init --recursive

      - name: Install esp-matter dependencies (cache miss)
        if: steps.cache-matter.outputs.cache-hit != 'true'
        shell: bash
        run: |
          export IDF_PATH="$HOME/esp-idf"
          source "$IDF_PATH/export.sh" >/dev/null

          # Strip `bluezoo` from connectedhomeip's pip requirements. It's a
          # BlueZ mock for host-side tests (we pass --no-host-tool anyway), and
          # recent PyPI releases pull in transitive deps that conflict with
          # other CHIP-pinned packages, breaking pip-tools compile. This is
          # purely a CI workaround; local installs that already cached a
          # working bluezoo continue to work.
          chip="$HOME/esp-matter/connectedhomeip/connectedhomeip"
          for f in "$chip"/scripts/setup/requirements.build.txt \
                   "$chip"/scripts/setup/requirements.txt \
                   "$chip"/scripts/setup/constraints.txt \
                   "$chip"/scripts/tests/requirements.txt; do
            if [ -f "$f" ]; then
              sed -i '/^[[:space:]]*bluezoo/d; /via bluezoo/d' "$f"
            fi
          done

          cd "$HOME/esp-matter"
          ./install.sh --no-host-tool

      - name: Export build environment
        shell: bash
        run: |
          CHIP_ROOT="$HOME/esp-matter/connectedhomeip/connectedhomeip"
          {
            echo "IDF_PATH=$HOME/esp-idf"
            echo "ESP_MATTER_PATH=$HOME/esp-matter"
            echo "CHIP_ROOT=$CHIP_ROOT"
            echo "PW_PROJECT_ROOT=$CHIP_ROOT"
            echo "PW_ROOT=$CHIP_ROOT/third_party/pigweed/repo"
          } >> "$GITHUB_ENV"
          echo "$CHIP_ROOT/.environment/cipd/packages/pigweed" >> "$GITHUB_PATH"

      - name: Build firmware
        shell: bash
        run: |
          source "$IDF_PATH/export.sh" >/dev/null
          cd "$GITHUB_WORKSPACE"
          idf.py set-target esp32c6 build

      - name: Generate signed manifest
        if: github.event_name == 'release'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO_SLUG: ${{ github.repository }}
          IDF_REF: ${{ env.IDF_VERSION }}
          MATTER_REF: ${{ env.ESP_MATTER_REF }}
          APP_BIN: build/${{ env.FIRMWARE_ASSET_NAME }}
          SIGNING_KEY_PEM: ${{ secrets.MANIFEST_SIGNING_KEY }}
        run: |
          chmod +x scripts/generate-manifest.sh
          scripts/generate-manifest.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32c6-led-web-firmware
          path: |
            build/esp32c6_led_web.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/project_description.json
            manifest.json
            manifest.json.sig
          if-no-files-found: warn

      - name: Attach release artifacts
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # The application binary (used by OTA).
          gh release upload "$RELEASE_TAG" "build/$FIRMWARE_ASSET_NAME" --clobber

          # Bootloader + partition table for first-time USB flashing.
          gh release upload "$RELEASE_TAG" \
            "build/bootloader/$BOOTLOADER_ASSET_NAME" \
            "build/partition_table/$PARTITION_TABLE_ASSET_NAME" --clobber || true

          # Signed manifest (devices fetch via /releases/latest/download/manifest.json).
          gh release upload "$RELEASE_TAG" "$MANIFEST_ASSET_NAME" --clobber
          if [ -f "$MANIFEST_SIG_ASSET_NAME" ]; then
            gh release upload "$RELEASE_TAG" "$MANIFEST_SIG_ASSET_NAME" --clobber
          fi
